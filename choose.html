<!DOCTYPE html>
<html lang="ru" class="h-100">
<head>

    <title>Nofelet - Главная</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"

    <link href="https://maximtretjakov.github.io/nofelet-ui/cover.css" rel="stylesheet">

<body class="d-flex h-100 text-center">

<div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
    <header class="mb-auto">
        <div>
            <nav class="nav nav-masthead justify-content-center float-md-end">
                <a class="nav-link active" aria-current="page" href="https://maximtretjakov.github.io/nofelet-ui/index.html">Главная</a>
                <a class="nav-link" href="https://maximtretjakov.github.io/nofelet-ui/choose.html">Звонки</a>

        </div>
    </header>

    <div class="text-center my-auto main-content-shift">
        <div class="row gx-5">
            <div class="col-md-6 mb-4">
                <div class="choice-card">
                    <h3>P2P-звонок</h3>
                    <p>Вы используете P2P-звонок. Ваше видео и голос передаются напрямую собеседнику. Мы не храним ваш трафик.</p>
                    <a href="call.html" class="btn btn-choose">Начать звонок</a>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="choice-card">
                    <h3>Групповой звонок</h3>
                    <p>Общение всей командой. Идеально подходит для совещаний, обсуждений проектов или семейных бесед.</p>
                    <a href="group-call.html" class="btn btn-choose">Начать звонок</a>
                </div>
            </div>
        </div>
